; This optional file lets users configure certain parts of the netlink.py script
; netlink.py is used in conjunction with the dreampi service or tunnel script
; -----------------------------------------------------------------------------------
; Serial port configuration
; Dreampi 2 by default will look for and use a USB-serial adapter
; The serial port will be monitored for debug output and serial PPP connections
; If you do not want Dreampi to use your adapter in this way add disabled = yes
; You can further specify the specific port to use with port = and the baud rate with baud =
; If nothing is specified in this section, the defaults are port = /dev/ttyUSB0 and baud = 115200
; This section has no effect on PC
; -----------------------------------------------------------------------------------
; DCNet configuration
; Must have enabled = yes to enable DCNet. Default is off.
; Connection using dcnet can be enabled by using outside dial prefix *69 in ISP settings
; If this section is blank, dcnet will be disabled
; Optionally specify dcnet.rpi path as dcnet_path =
; Default path is "/home/pi/dcnet.rpi"
; If dcnet.rpi does not exist it will be downloaded from the location specified by dcnet_url
; -----------------------------------------------------------------------------------
; Server dial-code configuration for DreamPi / netlink.py
; Each [server:1994XX] section maps dial code 1994XX to a TCP server.
; When the Saturn dials 1994XX, the tunnel connects to the server.
;
; Required: host, port
; Optional: shared_secret, auth_magic (default AUTH), auth_timeout (default 5.0),
;           name (for logs), handler (default "server", or "transparent")
;
; To add a new game server, copy a [server.1994XX] block and change the code/host/port.
; The dial code must match what the Saturn game dials (set in the game's modem init).

[Metadata]
version = 202604201024

[Serial Port]
; This section applies to Dreampi only. Not read on PC.
;port = /dev/ttyAMA0
;baud = 115200
;timeout =

[DCNet]
; This section applies to Dreampi only. Not read on PC.
enabled = yes
;dcnet_path = /home/pi/dreampi/dcnet.rpi
dcnet_url = https://raw.githubusercontent.com/scrivanidc/dreampi_custom_scripts/main/DCNET_V2/dcnet.rpi

[server:199401]
name = Coup
host = saturncoup.duckdns.org
port = 4821
shared_secret = SaturnCoup2025!NetLink#SecretKey
auth_magic = AUTH
auth_timeout = 5.0

[server:199402]
name = Disasteroids
host = saturncoup.duckdns.org
port = 4822
shared_secret = SaturnDisasteroids2026!NetLink#Key
auth_magic = AUTH
auth_timeout = 5.0

[server:199404]
name = Flickys Flock
host = saturncoup.duckdns.org
port = 4824
shared_secret = SaturnFlickysFlock2026!NetLink#Key
auth_magic = AUTH
auth_timeout = 5.0



